<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium YouTube Red Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0033"/>
      <stop offset="100%" stop-color="#E60000"/>
    </linearGradient>

    <!-- Clean Soft Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Clean Rounded Square Base -->
  <rect x="36" y="36" width="440" height="440" rx="100" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Minimalist White Chat Bubble -->
  <path d="M 152 116 
           H 360 
           A 52 52 0 0 1 412 168 
           V 288 
           A 52 52 0 0 1 360 340 
           H 230 
           L 150 400 
           V 340 
           H 152 
           A 52 52 0 0 1 100 288 
           V 168 
           A 52 52 0 0 1 152 116 Z" 
        fill="#FFFFFF"/>

  <!-- Centered Red Play Triangle Cutout -->
  <path d="M 224 180 
           L 320 236 
           A 10 10 0 0 1 320 252 
           L 224 308 
           A 10 10 0 0 1 208 298 
           V 190 
           A 10 10 0 0 1 224 180 Z" 
        fill="#E60000"/>
</svg>
